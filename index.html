<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Developer Portfolio</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom glow effects and scrollbars */
        .glow-card:hover {
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
        }
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #4f46e5;
        }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen font-sans selection:bg-indigo-500 selection:text-white">

    <div class="max-w-6xl mx-auto px-4 py-12 md:px-8">
        
        <header id="profile-card" class="opacity-0 transition-opacity duration-700 flex flex-col md:flex-row items-center gap-8 p-8 rounded-2xl bg-slate-900/40 border border-slate-800/80 backdrop-blur-md mb-12 shadow-2xl">
            <div id="avatar-container" class="relative group">
                <img id="avatar" src="" alt="Profile Picture" class="w-32 h-32 rounded-full border-4 border-indigo-500/30 object-cover shadow-xl transition-transform duration-300 group-hover:scale-105 hidden">
                <div id="avatar-loader" class="w-32 h-32 rounded-full bg-slate-800 animate-pulse"></div>
            </div>
            
            <div class="text-center md:text-left flex-1 space-y-3">
                <h1 id="name" class="text-4xl font-extrabold tracking-tight bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent">
                    Loading Portfolio...
                </h1>
                <p id="bio" class="text-slate-400 text-lg max-w-2xl">Fetching developer profile data directly from the matrix...</p>
                
                <div class="flex flex-wrap justify-center md:justify-start gap-3 text-xs font-medium text-slate-300 pt-2">
                    <span class="px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-xl flex items-center gap-1.5">
                        <i class="fa-solid fa-code-branch text-indigo-400"></i> <span id="repo-count">0</span> Repos
                    </span>
                    <span class="px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-xl flex items-center gap-1.5">
                        <i class="fa-solid fa-users text-purple-400"></i> <span id="follower-count">0</span> Followers
                    </span>
                    <span class="px-3 py-1.5 bg-slate-900 border border-slate-800 rounded-xl flex items-center gap-1.5">
                        <i class="fa-solid fa-location-dot text-pink-400"></i> <span id="location">Remote</span>
                    </span>
                </div>
            </div>

            <a id="github-link" href="#" target="_blank" rel="noopener noreferrer" class="w-full md:w-auto text-center px-6 py-3 bg-indigo-600 hover:bg-indigo-500 text-white font-semibold rounded-xl transition-all duration-300 shadow-lg shadow-indigo-600/20 hover:shadow-indigo-600/40 hover:-translate-y-0.5">
                <i class="fa-brands fa-github mr-2"></i>View GitHub
            </a>
        </header>

        <section class="flex flex-col sm:flex-row items-stretch sm:items-center justify-between gap-4 mb-8">
            <div class="relative flex-1 max-w-md">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 text-sm"></i>
                <input 
                    type="text" 
                    id="search-input" 
                    placeholder="Search repositories by name or language..." 
                    class="w-full pl-11 pr-4 py-2.5 bg-slate-900/60 border border-slate-800 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition-all text-slate-200 placeholder-slate-500"
                >
            </div>
            <div class="text-xs text-slate-500 flex items-center gap-1.5 self-end sm:self-center">
                <span class="h-2 w-2 rounded-full bg-emerald-500 animate-pulse"></span>
                Live Sync Active
            </div>
        </section>

        <main>
            <div id="repos-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div class="h-48 bg-slate-900/40 border border-slate-800/60 rounded-xl animate-pulse"></div>
                <div class="h-48 bg-slate-900/40 border border-slate-800/60 rounded-xl animate-pulse"></div>
                <div class="h-48 bg-slate-900/40 border border-slate-800/60 rounded-xl animate-pulse"></div>
            </div>
        </main>

    </div>

    <script>
        // 🚨 CONFIGURATION: Replace this with your own GitHub username
        const GITHUB_USERNAME = 'YOUR_GITHUB_USERNAME'; 

        // State storage for filtering
        let allRepositories = [];

        // DOM elements
        const elements = {
            profileCard: document.getElementById('profile-card'),
            avatar: document.getElementById('avatar'),
            avatarLoader: document.getElementById('avatar-loader'),
            name: document.getElementById('name'),
            bio: document.getElementById('bio'),
            repoCount: document.getElementById('repo-count'),
            followerCount: document.getElementById('follower-count'),
            location: document.getElementById('location'),
            githubLink: document.getElementById('github-link'),
            reposGrid: document.getElementById('repos-grid'),
            searchInput: document.getElementById('search-input')
        };

        // Initialize App
        async function init() {
            if (GITHUB_USERNAME === 'YOUR_GITHUB_USERNAME') {
                elements.name.innerText = "Configuration Required";
                elements.bio.innerText = "Please open the HTML code and update the 'GITHUB_USERNAME' variable with your GitHub profile name.";
                elements.profileCard.style.opacity = '1';
                return;
            }

            try {
                const [userData, reposData] = await Promise.all([
                    fetch(`https://api.github.com/users/${GITHUB_USERNAME}`).then(r => r.json()),
                    fetch(`https://api.github.com/users/${GITHUB_USERNAME}/repos?sort=updated&per_page=30`).then(r => r.json())
                ]);

                allRepositories = Array.isArray(reposData) ? reposData.filter(repo => !repo.fork) : [];
                
                renderProfile(userData);
                renderRepositories(allRepositories);
            } catch (error) {
                console.error("Error linking to GitHub API:", error);
                elements.name.innerText = "Failed to load profile";
                elements.reposGrid.innerHTML = `<p class="text-red-400 col-span-full text-center">Could not connect to GitHub. Check your connectivity or rate limit.</p>`;
            }
        }

        // Render Profile Card
        function renderProfile(user) {
            if(!user.login) return;
            
            elements.avatar.src = user.avatar_url;
            elements.avatar.classList.remove('hidden');
            elements.avatarLoader.classList.add('hidden');
            
            elements.name.innerText = user.name || user.login;
            elements.bio.innerText = user.bio || "Full-stack developer turning coffee into efficient engineering solutions.";
            elements.repoCount.innerText = user.public_repos;
            elements.followerCount.innerText = user.followers;
            elements.location.innerText = user.location || 'Distributed';
            elements.githubLink.href = user.html_url;
            
            elements.profileCard.style.opacity = '1';
        }

        // Render Project Cards Dynamically
        function renderRepositories(repos) {
            elements.reposGrid.innerHTML = '';

            if (repos.length === 0) {
                elements.reposGrid.innerHTML = `
                    <div class="col-span-full text-center py-12 text-slate-500">
                        <i class="fa-regular fa-folder-open text-3xl mb-2 block"></i>
                        No matching repositories found.
                    </div>`;
                return;
            }

            repos.forEach(repo => {
                const card = document.createElement('div');
                card.className = "glow-card flex flex-col justify-between p-6 rounded-xl bg-slate-900/60 border border-slate-800/80 hover:border-indigo-500/40 transition-all duration-300 hover:-translate-y-1 backdrop-blur-sm group";
                
                // Color badges depending on language type
                const langColor = getLanguageColor(repo.language);

                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between mb-3 gap-2">
                            <h3 class="font-bold text-lg text-slate-100 group-hover:text-indigo-400 transition-colors truncate">
                                ${repo.name}
                            </h3>
                            ${repo.language ? `
                                <span class="text-[11px] font-medium px-2 py-0.5 rounded-md bg-slate-950/80 border border-slate-800 text-slate-300 flex items-center gap-1.5 shrink-0">
                                    <span class="w-2 h-2 rounded-full" style="background-color: ${langColor}"></span>
                                    ${repo.language}
                                </span>
                            ` : ''}
                        </div>
                        <p class="text-slate-400 text-xs leading-relaxed line-clamp-3">
                            ${repo.description || "No public description provided for this repository architecture."}
                        </p>
                    </div>

                    <div class="flex items-center justify-between text-xs text-slate-500 mt-6 pt-4 border-t border-slate-800/60">
                        <div class="flex gap-4 font-medium">
                            <span class="hover:text-amber-400 transition-colors"><i class="fa-regular fa-star mr-1"></i>${repo.stargazers_count}</span>
                            <span class="hover:text-sky-400 transition-colors"><i class="fa-solid fa-code-fork mr-1"></i>${repo.forks_count}</span>
                        </div>
                        <a href="${repo.html_url}" target="_blank" rel="noopener noreferrer" class="text-indigo-400 hover:text-indigo-300 font-semibold flex items-center gap-1 transition-colors">
                            Source <i class="fa-solid fa-arrow-up-right-from-square text-[10px]"></i>
                        </a>
                    </div>
                `;
                elements.reposGrid.appendChild(card);
            });
        }

        // Live Search Filtering Functionality
        elements.searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase().trim();
            const filtered = allRepositories.filter(repo => {
                const nameMatch = repo.name.toLowerCase().includes(query);
                const langMatch = repo.language && repo.language.toLowerCase().includes(query);
                return nameMatch || langMatch;
            });
            renderRepositories(filtered);
        });

        // Dynamic Accent Colors for Languages
        function getLanguageColor(lang) {
            const colors = {
                JavaScript: '#f1e05a',
                TypeScript: '#3178c6',
                HTML: '#e34c26',
                CSS: '#563d7c',
                Python: '#3572A5',
                Go: '#00ADD8',
                Rust: '#dea584',
                Java: '#b07219'
            };
            return colors[lang] || '#94a3b8';
        }

        // Fire on load
        init();
    </script>
</body>
</html>
